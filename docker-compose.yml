version: '3.8'
services:
  p2p-node:
    build: .
    ports:
      - "9877:9877"
      - "9876:9876/udp"
      - "9090:9090"
    volumes:
      - p2p-data:/data
      - p2p-config:/config
    environment:
      - P2P_DISPLAY_NAME=node-${HOSTNAME}
      - P2P_METRICS_ENABLED=true
    networks:
      - p2p-net

networks:
  p2p-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  p2p-data:
  p2p-config:
