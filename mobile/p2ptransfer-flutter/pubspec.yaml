name: p2ptransfer
description: P2P file transfer mobile app
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: ^2.0.0
  path_provider: ^2.1.0
  file_picker: ^6.1.0
  permission_handler: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  ffigen: ^9.0.0

flutter:
  uses-material-design: true

flutter_rust_bridge:
  rust_input: rust/api.rs
  dart_output: lib/src/rust
